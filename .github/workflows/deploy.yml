name: Deploy to Apify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install --if-present
      - uses: apify/push-actor-action@v1
        with:
          apify-token: ${{ secrets.APIFY_TOKEN }}
